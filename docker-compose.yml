services:
  postgres:
    image: postgres:16-alpine
    container_name: moodmentor-postgres
    environment:
      POSTGRES_USER: moodmentor
      POSTGRES_PASSWORD: moodmentor
      POSTGRES_DB: moodmentor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodmentor -d moodmentor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - moodmentor-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moodmentor-backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NEWS_API_KEY: ${NEWS_API_KEY}
      API_KEY: ${API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 9000
      FRONTEND_URL: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:5173,http://127.0.0.1:5173
      DATABASE_URL: postgresql+asyncpg://moodmentor:moodmentor@postgres:5432/moodmentor
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      DISABLE_RATE_LIMIT: "false"
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - moodmentor-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moodmentor-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - moodmentor-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  moodmentor-network:
    driver: bridge